[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib']

# Monad Devnet/Testnet Configuration (Adjust as needed)
[rpc_endpoints]
monad = "https://rpc-devnet.monad.xyz"

[etherscan]
monad = { key = "${MONAD_EXPLORER_API_KEY}" }
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # ADD THIS STEP HERE:
      - name: Install Forge Dependencies
        run: forge install foundry-rs/forge-std --no-commit

      - name: Build contracts
        run: forge build
