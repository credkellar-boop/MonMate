name: Flutter CI

# This triggers the check on every push to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code into the virtual machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup the Flutter environment
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Speeds up future runs

      # 3. Install your dependencies (web3dart, supabase, etc.)
      - name: Install dependencies
        run: flutter pub get

      # 4. Check for code smells or syntax errors
      - name: Static Analysis
        run: flutter analyze

      # 5. Run your unit/widget tests
      - name: Run Tests
        run: flutter test
